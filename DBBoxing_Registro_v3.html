<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DB Boxing">
<title>DB Boxing — Registro de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E8002D; --red2:#9b001e; --black:#080808; --dark:#111;
  --card:#181818; --border:#2a2a2a; --text:#f0f0f0; --sub:#888;
  --green:#00C853; --italian-green:#009246; --italian-red:#CE2B37;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100vh;background:var(--black);
  font-family:'Barlow',sans-serif;color:var(--text);overscroll-behavior:none}

/* ── BANNER ─────────────────────────────────── */
.banner-wrap{
  width:100%;position:relative;overflow:hidden;
  border-bottom:2px solid var(--red);
}
.banner-wrap img{
  width:100%;display:block;height:auto;
}

/* Shimmer animation overlay */
.banner-shimmer{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(
    105deg,
    transparent 20%,
    rgba(255,255,255,0.04) 30%,
    rgba(255,255,255,0.10) 40%,
    rgba(255,255,255,0.04) 50%,
    transparent 60%
  );
  background-size:200% 100%;
  animation:shimmer 4s ease-in-out infinite;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* Subtle red pulse glow at bottom */
.banner-glow{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,
    transparent,rgba(232,0,45,0.6),rgba(255,255,255,0.4),
    rgba(206,43,55,0.6),transparent);
  animation:glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse{
  0%,100%{opacity:0.4;transform:scaleX(0.8)}
  50%{opacity:1;transform:scaleX(1)}
}

/* Corner sparkles */
.sparkle{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:#fff;animation:sparkle-anim 3s ease-in-out infinite;
}
.sparkle:nth-child(1){top:15%;left:22%;animation-delay:0s}
.sparkle:nth-child(2){top:40%;left:18%;animation-delay:0.8s}
.sparkle:nth-child(3){top:70%;left:25%;animation-delay:1.6s}
.sparkle:nth-child(4){top:20%;right:28%;animation-delay:0.4s}
.sparkle:nth-child(5){top:55%;right:22%;animation-delay:1.2s}
.sparkle:nth-child(6){top:75%;right:30%;animation-delay:2s}
@keyframes sparkle-anim{
  0%,100%{opacity:0;transform:scale(0)}
  50%{opacity:0.7;transform:scale(1)}
}

.sede-bar{
  background:#0a0a0a;border-top:1px solid #2a2a2a;
  padding:5px 14px;font-family:'Barlow Condensed',sans-serif;
  font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;
  color:#888;display:flex;align-items:center;gap:6px
}
.flag-strip{display:flex;height:3px;width:100%}
.flag-strip div{flex:1}
.flag-strip .fg{background:#009246}
.flag-strip .fw{background:#fff}
.flag-strip .fr{background:#CE2B37}

/* ── FORM ────────────────────────────────────── */
.form-body{padding:16px 14px 100px;display:flex;flex-direction:column;gap:10px}
.section-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.65rem;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--red);
  padding:14px 0 4px;display:flex;align-items:center;gap:8px
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* Field */
.field{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:14px 14px 12px;
  transition:border-color 0.2s;position:relative
}
.field:focus-within{border-color:var(--red);box-shadow:0 0 0 2px rgba(232,0,45,0.12)}
.field label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.7rem;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--sub);display:block;margin-bottom:8px
}
.field label .req{color:var(--red);margin-left:2px}

/* Select with visible arrow */
.select-wrap{position:relative}
.select-wrap select{
  width:100%;background:#111;
  border:1.5px solid #3a3a3a;border-radius:8px;
  outline:none;color:var(--text);
  font-family:'Barlow',sans-serif;font-size:1rem;font-weight:500;
  appearance:none;cursor:pointer;
  padding:10px 44px 10px 14px;
}
.select-wrap select:focus{border-color:var(--red)}
.select-wrap option{background:#1a1a1a;color:#fff}
.select-arrow{
  position:absolute;right:0;top:0;bottom:0;
  width:44px;display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  background:linear-gradient(90deg,transparent,#1a1a1a);
  border-radius:0 8px 8px 0;
}
.select-arrow svg{width:20px;height:20px;fill:var(--red)}

/* Qty stepper */
.field input[type="number"]{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Barlow',sans-serif;
  font-size:1.4rem;font-weight:600;-moz-appearance:textfield
}
.field input[type="number"]::-webkit-outer-spin-button,
.field input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.qty-row{display:flex;align-items:center;gap:0}
.qty-btn{
  width:44px;height:44px;border-radius:8px;
  background:var(--border);border:none;cursor:pointer;
  color:var(--text);font-size:1.4rem;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;flex-shrink:0;user-select:none
}
.qty-btn:active{background:var(--red)}
.qty-val{
  flex:1;text-align:center;font-family:'Bebas Neue',cursive;
  font-size:2.2rem;letter-spacing:2px;color:#fff
}
.price-hint{
  font-size:0.72rem;color:var(--red);margin-top:6px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;
  min-height:18px;transition:all 0.2s;
}
.price-hint.pack{color:#ffd700;font-weight:700}

/* Product blocks */
.prod-block{border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.prod-header{
  padding:10px 14px;display:flex;align-items:center;gap:8px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase
}
.prod-header.p1{background:#0a1520;color:#64b5f6;border-bottom:1px solid #1a3050}
.prod-header.p2{background:#0a1a0d;color:#81c784;border-bottom:1px solid #1a3520}
.prod-fields{background:var(--card);padding:12px 14px;display:flex;flex-direction:column;gap:10px}

/* Payment */
.pay-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay-opt{
  background:var(--border);border:2px solid transparent;
  border-radius:10px;padding:12px 8px;text-align:center;
  cursor:pointer;transition:all 0.2s;user-select:none
}
.pay-opt .pay-icon{font-size:1.4rem;display:block;margin-bottom:4px}
.pay-opt .pay-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.8rem;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--sub)
}
.pay-opt.selected{background:#1a0008;border-color:var(--red)}
.pay-opt.selected .pay-label{color:var(--red)}

/* Total */
.total-card{
  background:linear-gradient(135deg,#1a0008 0%,#0a0a0a 100%);
  border:1px solid var(--red);border-radius:12px;
  padding:16px 18px;display:flex;align-items:center;justify-content:space-between
}
.total-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.7rem;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--sub)
}
.total-amount{
  font-family:'Bebas Neue',cursive;font-size:2.4rem;
  letter-spacing:2px;color:#fff;line-height:1
}
.total-amount span{color:var(--red);font-size:1.4rem;margin-right:2px}
.promo-badge{
  display:none;background:#ffd700;color:#000;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.65rem;font-weight:700;letter-spacing:1px;
  border-radius:4px;padding:2px 8px;margin-top:4px;
}

/* Submit */
.btn-submit{
  position:fixed;bottom:0;left:0;right:0;background:var(--red);
  border:none;padding:18px;font-family:'Bebas Neue',cursive;
  font-size:1.4rem;letter-spacing:3px;color:#fff;
  cursor:pointer;z-index:99;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background 0.2s
}
.btn-submit:active{background:var(--red2)}
.btn-submit.loading{background:#555;pointer-events:none}

/* Success */
.success-screen{
  display:none;position:fixed;inset:0;background:var(--black);
  z-index:200;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:40px 24px;
  animation:fadeIn 0.3s ease
}
.success-screen.show{display:flex}
@keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.success-icon{font-size:5rem;margin-bottom:20px;animation:bounce 0.6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.success-title{
  font-family:'Bebas Neue',cursive;font-size:3rem;
  letter-spacing:3px;color:var(--green);margin-bottom:8px
}
.success-sub{color:var(--sub);font-size:0.9rem;margin-bottom:32px}
.success-detail{
  background:var(--card);border-radius:12px;padding:16px 20px;
  width:100%;max-width:320px;text-align:left;margin-bottom:28px
}
.success-detail .row{
  display:flex;justify-content:space-between;
  font-size:0.85rem;padding:5px 0;border-bottom:1px solid var(--border)
}
.success-detail .row:last-child{border:none}
.success-detail .row .k{color:var(--sub)}
.success-detail .row .v{color:#fff;font-weight:600}
.btn-nueva{
  background:var(--red);color:#fff;border:none;border-radius:10px;
  padding:14px 40px;font-family:'Bebas Neue',cursive;
  font-size:1.2rem;letter-spacing:2px;cursor:pointer
}

.form-body > *{animation:slideUp 0.3s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.form-body > *:nth-child(1){animation-delay:0.05s}
.form-body > *:nth-child(2){animation-delay:0.10s}
.form-body > *:nth-child(3){animation-delay:0.15s}
.form-body > *:nth-child(4){animation-delay:0.20s}
.form-body > *:nth-child(5){animation-delay:0.25s}
.form-body > *:nth-child(6){animation-delay:0.30s}
.form-body > *:nth-child(7){animation-delay:0.35s}
</style>
</head>

<script>
const PRECIOS       = { SUERO: 2000, JUGO: 1900 };
const PRECIOS_PACK6 = { SUERO: 9900, JUGO: 8100 };
const COSTO         = { SUERO: 950,  JUGO: 900  };
let metodoPago = 'Transferencia';
let qtys = { qty1: 1, qty2: 1 };

function calcPrecio(tipo, cantidad) {
  if (!tipo || !cantidad) return 0;
  const packs   = Math.floor(cantidad / 6);
  const sueltos = cantidad % 6;
  return (packs * PRECIOS_PACK6[tipo]) + (sueltos * PRECIOS[tipo]);
}

function updateHeader() {
  const sede = document.getElementById('sede').value;
  document.getElementById('sede-label').textContent = sede || 'San Miguel · La Cisterna';
}

function changeQty(id, delta) {
  qtys[id] = Math.max(1, Math.min(36, (qtys[id] || 1) + delta));
  document.getElementById(id).textContent = qtys[id];
  calcTotal();
}

// Cuando cambia Prod1 → filtra Prod2 para que no sea el mismo tipo
function onProd1Change() {
  const p1 = document.getElementById('prod1').value;
  const sel2 = document.getElementById('prod2');
  // Reset prod2
  sel2.value = '';
  // Rebuild options
  sel2.innerHTML = '<option value="">— No aplica —</option>';
  const opts = [
    {v:'SUERO', l:'SUERO — $2.000 unit. · Pack6: $9.900'},
    {v:'JUGO',  l:'JUGO — $1.900 unit. · Pack6: $8.100'}
  ];
  opts.forEach(o => {
    if (o.v !== p1) {  // Solo muestra el tipo DIFERENTE
      const opt = document.createElement('option');
      opt.value = o.v; opt.textContent = o.l;
      sel2.appendChild(opt);
    }
  });
  calcTotal();
}

function calcTotal() {
  const p1 = document.getElementById('prod1').value;
  const p2 = document.getElementById('prod2').value;
  const q1 = qtys.qty1 || 0;
  const q2 = qtys.qty2 || 0;

  const sub1 = calcPrecio(p1, q1);
  const sub2 = calcPrecio(p2, q2);
  const total = sub1 + sub2;
  const units = (p1 ? q1 : 0) + (p2 ? q2 : 0);

  document.getElementById('total-num').textContent = total.toLocaleString('es-CL');
  document.getElementById('total-units').textContent = units;

  // Show/hide qty2
  document.getElementById('qty2-field').style.display = p2 ? 'block' : 'none';

  // Price hints
  updateHint('hint1', p1, q1, sub1);
  updateHint('hint2', p2, q2, sub2);

  // Promo badge
  const hasPromo = (p1 && q1>=6) || (p2 && q2>=6);
  const badge = document.getElementById('promo-badge');
  badge.style.display = hasPromo ? 'inline-block' : 'none';
}

function updateHint(id, tipo, cantidad, subtotal) {
  const el = document.getElementById(id);
  if (!el || !tipo || !cantidad) { if(el) el.textContent=''; return; }
  const packs   = Math.floor(cantidad/6);
  const sueltos = cantidad%6;
  el.className = 'price-hint';
  if (packs>0 && sueltos===0) {
    el.textContent = `🎯 ${packs} pack${packs>1?'s':''} × ${PRECIOS_PACK6[tipo].toLocaleString('es-CL')} = $${subtotal.toLocaleString('es-CL')}`;
    el.classList.add('pack');
  } else if (packs>0) {
    el.textContent = `🎯 ${packs} pack + ${sueltos} suelto${sueltos>1?'s':''} = $${subtotal.toLocaleString('es-CL')}`;
    el.classList.add('pack');
  } else {
    el.textContent = `${cantidad} × $${PRECIOS[tipo].toLocaleString('es-CL')} = $${subtotal.toLocaleString('es-CL')}`;
  }
}

function selectPay(method) {
  metodoPago = method;
  document.getElementById('pay-transferencia').classList.toggle('selected', method==='Transferencia');
  document.getElementById('pay-efectivo').classList.toggle('selected', method==='Efectivo');
}

function submitForm() {
  const sede     = document.getElementById('sede').value;
  const vendedor = document.getElementById('vendedor').value;
  const prod1    = document.getElementById('prod1').value;
  const prod2    = document.getElementById('prod2').value;
  if (!sede)     { alert('⚠️ Selecciona la sede'); return; }
  if (!vendedor) { alert('⚠️ Selecciona el vendedor/a'); return; }
  if (!prod1)    { alert('⚠️ Selecciona al menos el Producto 1'); return; }

  const q1   = qtys.qty1||1;
  const q2   = qtys.qty2||1;
  const sub1 = calcPrecio(prod1,q1);
  const sub2 = prod2 ? calcPrecio(prod2,q2) : 0;
  const total= sub1+sub2;
  const now  = new Date();
  const fecha= now.toLocaleDateString('es-CL');
  const hora = now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});

  const btn = document.getElementById('btnSubmit');
  btn.classList.add('loading');
  btn.textContent = 'ENVIANDO...';

  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbweSPOGTOsvwH1EBlnTkUy9Brh6nbH43tRT8DjYS3U9haCho7icIKcU9oiGFpWnePVP0Q/exec';
  const payload = {
    fecha:fecha+' '+hora, sede, vendedor, metodoPago,
    prod1, qty1:q1, sub1,
    prod2:prod2||'', qty2:prod2?q2:0, sub2,
    total
  };

  if (APPS_SCRIPT_URL !== 'APPS_SCRIPT_URL_AQUI') {
    fetch(APPS_SCRIPT_URL,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    }).then(()=>showSuccess(payload)).catch(()=>showSuccess(payload));
  } else {
    setTimeout(()=>showSuccess(payload),800);
  }
}

function showSuccess(data) {
  document.getElementById('success-time').textContent = data.fecha+' · '+data.metodoPago;
  const p1packs = Math.floor(data.qty1/6);
  const p1label = p1packs>0 ? `${data.qty1} (${p1packs} pack)` : data.qty1;
  let rows = `
    <div class="row"><span class="k">Sede</span><span class="v">${data.sede}</span></div>
    <div class="row"><span class="k">Vendedor/a</span><span class="v">${data.vendedor}</span></div>
    <div class="row"><span class="k">${data.prod1}</span><span class="v">${p1label} → $${data.sub1.toLocaleString('es-CL')}</span></div>`;
  if (data.prod2) {
    const p2packs = Math.floor(data.qty2/6);
    const p2label = p2packs>0 ? `${data.qty2} (${p2packs} pack)` : data.qty2;
    rows += `<div class="row"><span class="k">${data.prod2}</span><span class="v">${p2label} → $${data.sub2.toLocaleString('es-CL')}</span></div>`;
  }
  rows += `<div class="row"><span class="k" style="color:#fff;font-weight:700">TOTAL</span><span class="v" style="color:#E8002D;font-size:1.1rem">$${data.total.toLocaleString('es-CL')}</span></div>`;
  document.getElementById('success-detail').innerHTML = rows;
  document.getElementById('btnSubmit').style.display='none';
  document.getElementById('successScreen').classList.add('show');
}

function resetForm() {
  ['sede','vendedor','prod1','prod2'].forEach(id=>document.getElementById(id).value='');
  qtys={qty1:1,qty2:1};
  document.getElementById('qty1').textContent='1';
  document.getElementById('qty2').textContent='1';
  document.getElementById('qty2-field').style.display='none';
  document.getElementById('hint1').textContent='';
  document.getElementById('hint2').textContent='';
  document.getElementById('promo-badge').style.display='none';
  // Restore prod2 options
  const sel2=document.getElementById('prod2');
  sel2.innerHTML='<option value="">— No aplica —</option>';
  [{v:'SUERO',l:'SUERO — $2.000 unit. · Pack6: $9.900'},{v:'JUGO',l:'JUGO — $1.900 unit. · Pack6: $8.100'}]
    .forEach(o=>{ const opt=document.createElement('option');opt.value=o.v;opt.textContent=o.l;sel2.appendChild(opt); });
  selectPay('Transferencia');
  updateHeader();
  const btn=document.getElementById('btnSubmit');
  btn.classList.remove('loading');
  btn.innerHTML='<span>✓</span> REGISTRAR VENTA';
  btn.style.display='flex';
  document.getElementById('successScreen').classList.remove('show');
  window.scrollTo(0,0);
}

calcTotal();
</script>
